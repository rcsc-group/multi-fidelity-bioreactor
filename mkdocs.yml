site_name: Rocking Bioreactor 2D — Simulation Suite
site_description: Two-phase CFD solver for a rocking bioreactor, with a multi-fidelity Bayesian optimization suite.
site_url: https://rcsc-group.github.io/multi-fidelity-bioreactor/
repo_url: https://github.com/rcsc-group/multi-fidelity-bioreactor
repo_name: rcsc-group/multi-fidelity-bioreactor
docs_dir: docs_site
site_dir: site

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.follow
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - tables
  - fenced_code
  - admonition
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Glossary: glossary.md
  - Setup: setup.md
  - Tutorials:
      - "Your first simulation": tutorials/first-simulation.md
      - "Your first sweep": tutorials/first-sweep.md
      - "Your first optimization loop": tutorials/first-optimization-loop.md
  - How-to guides:
      - "Run a single simulation": how-to/run-a-single-simulation.md
      - "Sweep one parameter": how-to/sweep-one-parameter.md
      - "Sweep any parameter combination (JSON)": how-to/sweep-json-multi-param.md
      - "Run a batch DoE": how-to/batch-sampling.md
      - "Run or resume the BO loop": how-to/run-bo-loop.md
      - "Generate videos": how-to/generate-videos.md
      - "Choose a fidelity level": how-to/choose-fidelity.md
      - "Diagnose a stalled or failed chain": how-to/diagnose-stalled-chain.md
  - Explanation:
      - "Checkpoint restart and warm-start chains": explanation/checkpoint-restart.md
      - "Non-dimensionalization": explanation/non-dimensionalization.md
      - "Multi-fidelity Bayesian optimization": explanation/multi-fidelity-bo.md
      - "Validating against Kim et al. (2024)": explanation/kim-et-al-validation.md
  - Reference:
      - "params.json": reference/params.md
      - "Output files": reference/output-files.md
      - "Fidelity guide": reference/fidelity-guide.md
      - "Scripts": reference/scripts.md
      - "Project structure": reference/project-structure.md
  - Test suite: testing.md
