site_name: Rocking Bioreactor 2D — Simulation Suite
site_description: Two-phase CFD solver for a rocking bioreactor, with a multi-fidelity Bayesian optimization suite.
site_url: https://rcsc-group.github.io/multi-fidelity-bioreactor/
repo_url: https://github.com/rcsc-group/multi-fidelity-bioreactor
repo_name: rcsc-group/multi-fidelity-bioreactor
docs_dir: docs_site
site_dir: site

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.follow
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - tables
  - fenced_code
  - admonition
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Glossary: glossary.md
  - Setup: setup.md
  - Scripts at a glance: scripts-overview.md
  - Workflows:
      - "A — Single run": workflows/single-run.md
      - "B — Chained parameter sweep (YAML)": workflows/chained-sweep.md
      - "C — Batch sampling": workflows/batch-sampling.md
      - "D — Multi-fidelity Bayesian optimisation": workflows/bayesian-optimization.md
      - "E — JSON multi-param sweep": workflows/json-sweep.md
  - Video generation: video-generation.md
  - Reference:
      - "params.json reference": reference/params.md
      - "Output files reference": reference/output-files.md
      - "Fidelity guide": reference/fidelity-guide.md
      - "Project structure": reference/project-structure.md
  - Test suite: testing.md
