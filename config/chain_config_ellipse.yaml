# ─────────────────────────────────────────────────────────────────────────────
# Chained frequency sweep — ellipse bag, 0.5 → 2.0 Hz rocking.
# Run with: python scripts/chain.py config/chain_config_ellipse.yaml
# ─────────────────────────────────────────────────────────────────────────────

# ── Fixed params ──────────────────────────────────────────────────────────────
fidelity: 7
geometry: {a: 0.20, b: 0.09, n: 2.0}   # superellipse bag (n=2 → ellipse)
fill_level: 0.4

# ── Timing ───────────────────────────────────────────────────────────────────
n_mix_cycles: 80         # rocking cycles before O₂ injection for segment 0
n_transition_cycles: 10  # rocking cycles before O₂ re-injection for segments 1+
t_buffer: 150            # non-dim kLa measurement window

# ── Sweep: rocking frequency (Hz → rad/s = Hz × 2π) ─────────────────────────
sweep:
  parameter: omega_b
  values: [3.14159, 6.28318, 9.42478, 12.56637]   # 0.5, 1.0, 1.5, 2.0 Hz

# ── Base motion (from ellipse reference run) ──────────────────────────────────
motion:
  n_harmonics: 1
  theta_max: [5.0, 0.0, 0.0]
  phi_angular: [0.3, 0.0, 0.0]
  omega_h: 6.28318          # horizontal oscillation fixed at 1 Hz
  amplitude_h: [0.02, 0.0, 0.0]
  phi_horizontal: [0.3, 0.0, 0.0]

# ── Output ───────────────────────────────────────────────────────────────────
videos: true              # use BioReactor-video binary; render videos per segment

# ── SLURM ─────────────────────────────────────────────────────────────────────
submit: true
walltime: "04:00:00"      # segment 0 needs ~3h at fidelity 7; restart segments ~2h
