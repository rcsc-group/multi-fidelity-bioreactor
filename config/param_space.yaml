N_max: 3  # maximum number of harmonics; vectors always padded to this length

parameters:
  omega_b:
    type: continuous
    bounds: [1.57, 6.28]   # rad/s — approx 15–60 RPM

  n_harmonics:
    type: integer
    bounds: [1, 3]

  theta_max:
    type: continuous
    bounds: [2.0, 7.0]     # degrees
    length: N_max
    note: "amplitude of angular harmonic k (1-indexed)"

  phi_angular:
    type: continuous
    bounds: [0.0, 6.2832]  # radians [0, 2π]
    length: N_max
    note: "index 0 fixed to 0.0 — time-origin reference, not a free parameter"

  omega_h:
    type: continuous
    bounds: [0.0, 6.28]    # rad/s; set to 0 to disable horizontal forcing

  amplitude_h:
    type: continuous
    bounds: [0.0, 0.05]    # metres
    length: N_max

  phi_horizontal:
    type: continuous
    bounds: [0.0, 6.2832]  # radians [0, 2π]
    length: N_max

  geometry.a:
    type: continuous
    bounds: [0.15, 0.35]   # metres — superellipse semi-axis a (horizontal)

  geometry.b:
    type: continuous
    bounds: [0.05, 0.15]   # metres — superellipse semi-axis b (vertical)

  geometry.n:
    type: continuous
    bounds: [2.0, 8.0]     # shape exponent: 2=ellipse, 8≈rectangle with rounded corners

  fill_level:
    type: continuous
    bounds: [0.3, 0.7]     # liquid volume fraction
