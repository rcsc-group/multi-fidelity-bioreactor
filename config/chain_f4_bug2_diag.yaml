# Minimal 2-segment chain to reproduce Bug 2 (blow-up at t_mix restart).
# Fidelity 4 is the minimum level that has coarse cells (level 3) near the
# embedded wall with D=0 after harmonic restriction — which is where the blow-up
# originates. Fidelity 3 is clean because level 3 is the finest level there.
#
# t_buffer=1.0 gives seg1 enough time past t_mix_seg1 to trigger the blow-up.
# Enhanced diagnostics in this build: H_RELAX_BLOW and FINE_RES_BLOW now log
# b[], cm[], D.y values, actual tracer name, and fire at threshold 1e4 (not 1e10).
#
# Run: python scripts/chain.py config/chain_f4_bug2_diag.yaml

fidelity: 4
geometry: {a: 0.25, b: 0.071, n: 2.0}
fill_level: 0.7

n_mix_cycles: 3
n_transition_cycles: 2
t_buffer: 1.0

sweep:
  parameter: omega_b
  values: [6.28, 6.28]

motion:
  n_harmonics: 1
  theta_max: [7.0, 0.0, 0.0]
  phi_angular: [0.0, 0.0, 0.0]
  omega_h: 0.0
  amplitude_h: [0.0, 0.0, 0.0]
  phi_horizontal: [0.0, 0.0, 0.0]
  omega_b: 6.28

mpi: true
videos: false
submit: true
ntasks: 4
walltime: "00:20:00"
